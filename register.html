  </head>

  <body>

      <h1 class="text-logo">MY PORTFOLIO</h1>

      <input type="checkbox" id="menu-toggle" class="menu-toggle" hidden />
      <label for="menu-toggle" class="burger-menu">
        <span></span>

        <span></span>
      </label>

      <ul class="nav-bar">
        <li class="nav-bar-item">
          <a href="#achievments" class="nav-bar-item-link"> Досягнення </a>
        </li>
        <li class="nav-bar-item">
          <a href="#targets" class="nav-bar-item-link">Цілі</a>
        </li>
        <li class="nav-bar-item">

        </li>
        <li class="nav-bar-item">
          <a href="#gallery" class="nav-bar-item-link"> Галерея </a>

          <a href="./register.html" class="nav-bar-item-link"> Реєстрація </a>
        </li>
      </ul>
    </header>

    <main>
      <!-- Тут буде реалізована форма реєстрації на сайті, яка буде містити наступні поля:
        1. Поле для вводу логіна
        2. Поле для вводу пароля
        3. Поле для вводу повторного пароля
        4. Поле для вводу пошти
        5. Поле для вводу номера телефону
        6. Поле для вводу адреси
        7. Поле для вводу дати народження
        8. Кнопка "Зареєструватись"
        9. Кнопка "Скасувати"
        -->

      <form>
        <label for="login"> Поле для вводу логіна: </label>
        <input
          type="text"
          name="login"
          id="login"
          placeholder="Введіть логін"
          required
          minlength="4"
          maxlength="16"
          pattern="[a-zA-Z0-9]+"
          title="Логін повинен містити від 4 до 16 символів, включаючи букви та цифри"
        />

        <label for="password"> Поле для вводу пароля: </label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Введіть пароль"
          required
          minlength="6"
          maxlength="32"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,32}$"
          title="Пароль повинен містити від 6 до 32 символів, включаючи букви та цифри"
        />

        <label for="password-repeat"> Поле для вводу повторного пароля: </label>
        <input
          type="password"
          name="password-repeat"
          id="password-repeat"
          placeholder="Введіть пароль"
          required
          minlength="6"
          maxlength="32"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,32}$"
          title="Пароль повинен містити від 6 до 32 символів, включаючи букви та цифри"
        />

        <label for="email"> Поле для вводу пошти: </label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Введіть пошту"
          required
          pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          title="Введіть коректну електронну пошту"
        />

        <label for="phone"> Поле для вводу номера телефону: </label>
        <input
          type="tel"
          name="phone"
          id="phone"
          placeholder="Введіть номер телефону в форматі 0xxxxxxxxx"
          required
          pattern="[0-9]{10}"
          title="Введіть коректний номер телефону (тільки цифри)"
        />

        <label for="address"> Поле для вводу адреси: </label>
        <input
          type="text"
          name="address"
          id="address"
          placeholder="Введіть адресу"
          required
          minlength="6"
          maxlength="32"
          pattern="[a-zA-Z0-9]+"
          title="Адреса повинна містити від 6 до 32 символів, включаючи букви та цифри"
        />

        <label for="birthdate"> Поле для вводу дати народження: </label>
        <input
          type="date"
          name="birthdate"
          id="birthdate"
          placeholder="Введіть дату народження"
          required
        />

        <input type="button" value="Зареєструватись" />
        <input type="button" value="Скасувати" />
      </form>
    </main>

    <footer>
      <!-- форма опитування -->
      <form class="footer-form">
        <label for="email"> Поле для вводу пошти: </label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Введіть пошту"
        />
        <input type="button" value="Підписатись на розсилку" />
      </form>

      <ul id="contacts">
        <li>0661234567</li>
        <li>email@example.com</li>
      </ul>

      <p class="copy">&copy; My portfolio</p>
    </footer>
  </body>
